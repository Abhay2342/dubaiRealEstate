# fly.toml app configuration file generated for dubai-real-estate on 2026-03-14T18:38:21+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dubai-real-estate'
primary_region = 'bom'

[build]

[env]
  SERVER_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '20s'
    timeout = '10s'
    grace_period = '40s'
    method = 'GET'
    path = '/api/sales?page=0&size=1'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
